services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build: ./backend
    env_file: .env.example
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: remediation_twin
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
  web:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  mongo-data:
